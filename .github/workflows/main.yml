name: CI Pipeline

# This tells GitHub to run the tests every time you push to main 
# or open a Pull Request to main.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # Runs on a fresh Linux server hosted by GitHub
    runs-on: ubuntu-latest

    steps:
    # 1. Grab your code from the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Install Python 3.10
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: 'pip' # Speeds up future runs by caching downloads
        cache-dependency-path: 'requirements-test.txt'

    # 3. Install your project dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install main dependencies (if you have them)
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Install testing dependencies (pytest, black, ruff)
        if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi

    # 6. Run the Unit Tests (Pytest)
    - name: Run Unit Tests
      run: |
        pytest tests/ -v